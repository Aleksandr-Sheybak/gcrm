<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсы – Самоцветы CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar"> ... </aside>
        <main class="content">
            <header class="topbar">
                <h1><i class="fas fa-book"></i> Курсы</h1>
                <button class="btn-add"><i class="fas fa-plus"></i> Добавить</button>
            </header>
            <div class="table-container">
                <table id="coursesTable">
                    <thead><tr><th>Название</th><th>Дата</th><th>Мест</th><th>Занято</th><th>Действия</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/admin.js"></script>
    <script>
        async function loadCourses() {
            const data = await api({ action: 'courseList' });
            const tbody = document.querySelector('#coursesTable tbody');
            tbody.innerHTML = data.courses.filter(c => c.status === 'active').map(c => `
                <tr>
                    <td>${c.name}</td><td>${c.date}</td><td>${c.maxSeats}</td><td>${c.booked}</td>
                    <td>
                        <button onclick="bookCourse('${c.id}')">+1</button>
                        <button onclick="cancelCourse('${c.id}')">Отменить</button>
                    </td>
                </tr>
            `).join('');
        }
        async function bookCourse(id) { await api({ action: 'bookingAdd', courseId: id }); loadCourses(); }
        async function cancelCourse(id) { await api({ action: 'courseCancel', id }); loadCourses(); }
        loadCourses();
    </script>
</body>
</html>
