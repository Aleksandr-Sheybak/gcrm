<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиенты – Самоцветы CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar"> ... </aside>
        <main class="content">
            <header class="topbar">
                <h1><i class="fas fa-users"></i> Клиенты</h1>
                <button class="btn-add"><i class="fas fa-plus"></i> Добавить</button>
            </header>
            <div class="table-container">
                <table id="clientsTable">
                    <thead><tr><th>ФИО</th><th>Телефон</th><th>Возраст</th><th>Действия</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/admin.js"></script>
    <script>
        async function loadClients() {
            const data = await api({ action: 'clientList' });
            const tbody = document.querySelector('#clientsTable tbody');
            tbody.innerHTML = data.clients.map(c => `
                <tr>
                    <td>${c.fio}</td><td>${c.phone}</td><td>${c.age || '—'}</td>
                    <td><button>👁️</button></td>
                </tr>
            `).join('');
        }
        loadClients();
    </script>
</body>
</html>
